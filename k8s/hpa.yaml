# HorizontalPodAutoscaler: escala entre 2 y 10 réplicas según CPU.
# Útil si el juego recibe picos de tráfico (un solo pod nginx puede
# servir cientos de conexiones, pero el escalado da margen).
# Requiere metrics-server instalado en el clúster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: modern-warfare
  namespace: modern-warfare
  labels:
    app.kubernetes.io/name: modern-warfare-react
    app.kubernetes.io/component: game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: modern-warfare
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

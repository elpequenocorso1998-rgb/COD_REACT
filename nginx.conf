# Configuración de nginx para servir el juego en el puerto 9432.
# - Escuchamos en 9432 (puerto solicitado por el usuario).
# - Servimos los estáticos desde /usr/share/nginx/html (donde el
#   Dockerfile copia el resultado de 'vite build').
# - try_files para que el enrutado del lado cliente no devuelva 404.
# - Cabeceras de seguridad: CSP, X-Frame-Options, HSTS, etc. Un juego
#   con WebGL + pointer lock debe especialmente protegerse.
# - server_tokens off para no exponer la versión de nginx.

server {
    listen 9432;
    listen [::]:9432;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # --- Cabeceras de seguridad ---
    # CSP: 'self' para scripts/imagenes/connect; permitimos Google Fonts
    # (style-src + font-src) porque styles.css hace @import de Rajdhani/Oswald.
    # Sin inline ni unsafe-eval. frame-ancestors 'none' evita clickjacking.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # HSTS: solo tiene efecto sobre HTTPS, pero lo incluimos por si se
    # sirve detrás de un proxy TLS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compresión para que los JS se descarguen rápido.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de cache largas para los assets con hash (Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-aplicamos las cabeceras de seguridad también en /assets
        # (nginx las pierde al entrar en un location block distinto).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

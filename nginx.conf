# Configuración de nginx para servir el juego en el puerto 9432.
# - Escuchamos en 9432 (puerto solicitado por el usuario).
# - Servimos los estáticos desde /usr/share/nginx/html (donde el
#   Dockerfile copia el resultado de 'vite build').
# - try_files para que el enrutado del lado cliente no devuelva 404.
server {
    listen 9432;
    listen [::]:9432;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para que los JS se descarguen rápido.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de cache largas para los assets con hash (Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

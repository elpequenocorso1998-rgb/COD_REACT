<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="FPS tipo Call of Duty para navegador, hecho en React + Three.js. Sobrevive a oleadas infinitas en una Pamplona procedural." />
    <meta name="theme-color" content="#0a0f18" />
    <!-- Three.js requiere un crosshair y UI fija: bloqueamos el zoom táctil
         de verdad (maximum-scale=1, user-scalable=no) para que el doble-tap
         no haga zoom en móvil. Antes el comentario decía "bloqueamos" pero
         maximum-scale=5.0 permitía zoom hasta 5x. -->
    <title>Modern Warfare React</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Este juego requiere JavaScript habilitado para funcionar.</noscript>
    <!-- Fase 6: filtros SVG para simulación de daltonismo (colorblind) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <filter id="cb-protanopia">
        <feColorMatrix values="0.567 0.433 0 0 0 0.558 0.442 0 0 0 0 0.242 0.758 0 0 0 0 0 1 0"/>
      </filter>
      <filter id="cb-deuteranopia">
        <feColorMatrix values="0.625 0.375 0 0 0 0.7 0.3 0 0 0 0 0.3 0.7 0 0 0 0 0 1 0"/>
      </filter>
      <filter id="cb-tritanopia">
        <feColorMatrix values="0.95 0.05 0 0 0 0 0.433 0.567 0 0 0 0.475 0.525 0 0 0 0 0 1 0"/>
      </filter>
    </svg>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
